# ────────────────────────────────────────────────────────────
# moaxy — Example Configuration
# ────────────────────────────────────────────────────────────
# Copy this file to config.yaml and customize for your environment.
#
# Quick start:
#   1. cp config.example.yaml config.yaml
#   2. export MOAXY_ADMIN_API_KEY="your-secret-key"
#   3. uvicorn moaxy.server.app:create_app --factory --host 0.0.0.0 --port 8000
#
# All values support ${ENV_VAR} substitution (e.g. "${OPENAI_API_KEY}").

# ── Server ─────────────────────────────────────────────────
# Address and port the proxy binds to.
listen: "0.0.0.0"
port: 8000
log_level: "info"

# ── Plugins ─────────────────────────────────────────────────
# Plugin discovery scans the plugins/ directory for Plugin subclasses.
# Each plugin must have a plugin.py file with a Plugin subclass.
# Plugins are loaded in alphabetical order.
plugins_dir: "plugins"

# Optional per-plugin config (keyed by plugin class name).
# plugin_config:
#   HeaderLogger:
#     log_all_headers: true

# ── Backends ────────────────────────────────────────────────
backends:
  - name: "ollama-local"
    adapter: "ollama"
    base_url: "http://localhost:11434"
    timeout: 30.0

  # - name: "openai"
  #   adapter: "openai"
  #   base_url: "https://api.openai.com/v1"
  #   api_key: "${OPENAI_API_KEY}"
  #   timeout: 30.0

# ── Routes ──────────────────────────────────────────────────
routes:
  - name: "catch-all"
    match:
      model: "*"
      path: "/*"
    strategy: "single"
    backend: "ollama-local"

