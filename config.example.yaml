# ────────────────────────────────────────────────────────────
# moaxy — Example Configuration
# ────────────────────────────────────────────────────────────
# Copy this file to config.yaml and customize for your environment.
#
# Quick start:
#   1. cp config.example.yaml config.yaml
#   2. (optional) export OPENAI_API_KEY="..." for non-Ollama backends
#   3. uvicorn moaxy.server.app:create_app --factory --host 127.0.0.1 --port 8765
#
# All values support ${ENV_VAR} substitution (e.g. "${OPENAI_API_KEY}").

# ── Server ─────────────────────────────────────────────────
# Address and port the proxy binds to. The M1 server-level config
# mandates a loopback listen address (127.0.0.1 or ::1) for security.
server:
  listen: "127.0.0.1"
  port: 8765
  log_level: "info"
  plugins_dir: "plugins"
  request_timeout_s: 60.0

# ── Plugins ─────────────────────────────────────────────────
# Plugin discovery scans the plugins/ directory for Plugin subclasses.
# Each plugin must have a plugin.py file with a Plugin subclass.
# Plugins are loaded in alphabetical order.

# Optional per-plugin config (keyed by plugin class name).
# plugin_config:
#   HeaderLogger:
#     log_all_headers: true

# ── Backends ────────────────────────────────────────────────
backends:
  - name: "ollama-local"
    adapter: "ollama"
    base_url: "http://localhost:11434"
    timeout: 30.0

  # - name: "openai"
  #   adapter: "openai"
  #   base_url: "https://api.openai.com/v1"
  #   api_key: "${OPENAI_API_KEY}"
  #   timeout: 30.0

  # OpenRouter is a multi-provider LLM gateway (300+ models behind a
  # single OpenAI-compatible API). Set ``OPENROUTER_API_KEY`` in your
  # environment (or in a local ``.env`` file that is in .gitignore) and
  # the route below can talk to any of the OpenRouter model ids.
  - name: "openrouter-prod"
    adapter: "openrouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    timeout: 60.0
    http_referer: "https://moaxy.example.com"
    x_title: "moaxy"
    transforms:
      - "middle-out"

# ── Routes ──────────────────────────────────────────────────
# First-match-wins. ``model`` and ``path`` use fnmatch globs.
# ``aliases`` is a per-route alias table: clients send the alias,
# the proxy rewrites to the real model name on the way to the backend,
# and the response ``body.model`` echoes the original alias.
# ``fallbacks`` and ``retry`` are the per-route fallback chain.
routes:
  - name: "reflective-coder"
    match:
      model: "coder-pro"
      path: "/v1/chat/completions"
    strategy: "single"
    backend: "ollama-local"
    aliases:
      "coder-pro": "minimax-m3:cloud"
    fallbacks:
      - "minimax-m2.7:cloud"
      - "deepseek-v4-pro:cloud"
    retry: 1
    reflection:
      turns: 1
      early_exit: true
      threshold: 0.85
      parallel: false
    advisor:
      model: "deepseek-v4-pro:cloud"
      turns: 1
      parallel: false

  - name: "plain"
    match:
      model: "*"
      path: "/v1/chat/completions"
    strategy: "single"
    backend: "ollama-local"

  # OpenRouter route. The client sends ``my-coder`` (an alias); moaxy
  # rewrites it to ``anthropic/claude-3-haiku`` for the OpenRouter
  # backend. If the primary model fails, moaxy walks the ``fallbacks``
  # list and tries ``openai/gpt-4o-mini`` next. ``OPENROUTER_API_KEY``
  # must be set in the environment for this route to work.
  - name: "openrouter-coder"
    match:
      model: "my-coder"
      path: "/v1/chat/completions"
    strategy: "single"
    backend: "openrouter-prod"
    aliases:
      "my-coder": "anthropic/claude-3-haiku"
    fallbacks:
      - "openai/gpt-4o-mini"
    retry: 1

# ── Per-model defaults (used when a route doesn't override) ──
# models:
#   fallbacks:
#     "minimax-m3:cloud": ["minimax-m2.7:cloud", "deepseek-v4-pro:cloud"]
#   retry:
#     "minimax-m3:cloud": 2

